<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="container">
  <h1>회원가입</h1>
  <p class="page-lead">입력한 내용을 GET 방식으로 결과 페이지에 전달하는 폼입니다.</p>

  <nav class="site-nav" aria-label="김상훈의 페이지 메뉴">
    <h3>페이지 메뉴</h3>
    <ul>
      <li><a href="index.html">메인으로</a></li>
      <li><a href="myProfile.html">내 소개</a></li>
    </ul>
  </nav>

  <hr>

  <p class="form-note"><strong>안내:</strong> 수업용 입력 화면이며 실제 계정은 만들거나 저장하지 않습니다.</p>

  <form action="signUpResult.html" method="get">
    <fieldset>
      <legend>기본 계정 정보</legend>

      <p>
        <label for="user-id">아이디:</label>
        <input id="user-id" name="userId" type="text" placeholder="4~15자 영문/숫자" minlength="4" maxlength="15" required>
        <small>(필수)</small>
      </p>

      <p>
        <label for="password">비밀번호:</label>
        <input id="password" name="password" type="password" placeholder="8자 이상 입력" minlength="8" required>
        <small>(필수)</small>
        <label class="form-helper"><input id="show-password" type="checkbox"> 입력한 비밀번호 보기</label>
      </p>

      <p>
        <label for="email-id">이메일:</label>
        <input id="email-id" name="emailId" type="text" placeholder="example" required>
        <span aria-hidden="true"> @ </span>
        <label for="email-domain">이메일 도메인:</label>
        <select id="email-domain" name="emailDomain" required>
          <option value="">선택해 주세요</option>
          <option value="naver.com">naver.com</option>
          <option value="gmail.com">gmail.com</option>
          <option value="daum.net">daum.net</option>
        </select>
      </p>
    </fieldset>

    <br>

    <fieldset>
      <legend>추가 정보</legend>

      <p>
        <label for="name">이름:</label>
        <input id="name" name="name" type="text" required>
      </p>

      <p>
        <label for="birthday">생년월일:</label>
        <input id="birthday" name="birthday" type="date" required>
      </p>

      <fieldset>
        <legend>성별</legend>
        <label><input type="radio" name="gender" value="male" checked> 남성</label>
        <label><input type="radio" name="gender" value="female"> 여성</label>
        <label><input type="radio" name="gender" value="none"> 선택 안 함</label>
      </fieldset>

      <p>관심 분야 (중복 선택 가능):</p>
      <label><input type="checkbox" name="interest" value="frontend"> 프론트엔드</label><br>
      <label><input type="checkbox" name="interest" value="backend"> 백엔드</label><br>
      <label><input type="checkbox" name="interest" value="ax"> AX</label><br>
      <label><input type="checkbox" name="interest" value="domain"> 본인의 기존 도메인</label>

      <p>
        <label for="signup-route">이 페이지를 알게 된 경로:</label>
        <select id="signup-route" name="signupRoute" required>
          <option value="">-- 선택해 주세요 --</option>
          <option value="skala">SKALA 수업</option>
          <option value="review">지인 소개</option>
          <option value="search">웹 검색</option>
        </select>
      </p>
    </fieldset>

    <br>

    <fieldset>
      <legend>자기소개</legend>
      <label for="introduction">간단한 자기소개:</label><br>
      <textarea id="introduction" name="introduction" rows="6" cols="45" maxlength="200" placeholder="간단한 자기소개를 적어주세요."></textarea>
      <small id="introduction-count" class="count-text" aria-live="polite">0 / 200자</small>
    </fieldset>

    <p>
      <button type="submit">회원가입</button>
      <button type="reset">초기화</button>
    </p>
  </form>
  <footer class="site-footer"><p>김상훈의 SKALA 프론트엔드 과제</p></footer>
  </div>
  <script src="../script/site.js"></script>
  <script src="../script/formHelper.js"></script>
</body>

</html>
